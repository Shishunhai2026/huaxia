# 刘建军中西医诊所 - Nginx配置（用于宝塔面板）
# 如果使用Nginx（非Apache），将以下内容添加到网站配置中

server {
    listen 80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # 强制HTTPS（部署SSL证书后开启）
    # return 301 https://$server_name$request_uri;

    root /www/wwwroot/YOUR_DOMAIN;
    index index.php index.html;

    # 日志
    access_log /www/wwwlogs/YOUR_DOMAIN.log;
    error_log /www/wwwlogs/YOUR_DOMAIN.error.log;

    # WordPress伪静态
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP处理
    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-74.sock;  # 根据PHP版本调整
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # 静态资源缓存（7天-1年）
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    # 禁止访问敏感文件
    location ~* \.(htaccess|htpasswd|git|svn|log|bak|sql|sh)$ {
        deny all;
    }

    # 禁止访问WordPress内部目录
    location ~* /(wp-config\.php|xmlrpc\.php|wp-config-sample\.php) {
        deny all;
    }

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;
}
